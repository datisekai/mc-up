# McUp — deploy sau NGINX của bạn (không Caddy). Backend chạy trên 1 cổng host (APP_PORT),
# nginx trên host reverse-proxy domain → cổng đó + lo SSL.
# Dùng qua: ./deploy.sh  (hoặc: docker compose -f docker-compose.deploy.yml up -d --build)
services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://mcup:${POSTGRES_PASSWORD:-mcup}@postgres:5432/mcup
      UPLOAD_DIR: /data/uploads
    ports:
      # Chỉ bind vào 127.0.0.1 → KHÔNG lộ trực tiếp ra internet, chỉ nginx trên host gọi được.
      - "127.0.0.1:${APP_PORT:-3011}:8000"
    volumes:
      - clipdata:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mcup
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcup}
      POSTGRES_DB: mcup
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcup"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  clipdata:
