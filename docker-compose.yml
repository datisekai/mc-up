# Hạ tầng local McUp — tương đương những gì tự-host trên VPS
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mcup
      POSTGRES_PASSWORD: mcup
      POSTGRES_DB: mcup
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  # Object storage clip (S3-compatible, tự-host) — AD-4
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mcup
      MINIO_ROOT_PASSWORD: mcup12345
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

volumes:
  pgdata:
  miniodata:
