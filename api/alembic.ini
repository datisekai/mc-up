# Alembic — migration schema DB (thay create_all): redeploy đổi schema KHÔNG mất dữ liệu.
# App tự chạy "upgrade head" lúc khởi động (api/app/db.py). CLI khi dev:
#   cd mcup && PYTHONPATH=. api/.venv/bin/alembic -c api/alembic.ini revision --autogenerate -m "mo ta"
[alembic]
script_location = %(here)s/migrations
# URL không đặt ở đây — migrations/env.py tự lấy DATABASE_URL từ api/app/config.py,
# hoặc nhận thẳng connection từ app khi chạy lúc khởi động.
