# McUp — reverse proxy nginx (đứng trước backend Docker chạy ở APP_PORT, vd 3011).
#
# Cách dùng trên VPS:
#   1) sudo cp nginx.conf /etc/nginx/sites-available/mcup
#   2) suda nano /etc/nginx/sites-available/mcup   # đổi YOUR_DOMAIN và cổng nếu khác 3011
#   3) sudo ln -s /etc/nginx/sites-available/mcup /etc/nginx/sites-enabled/
#   4) sudo nginx -t && sudo systemctl reload nginx
#   5) HTTPS (sau khi HTTP đã chạy): sudo certbot --nginx -d YOUR_DOMAIN
#      → certbot tự thêm block listen 443 + chứng chỉ + chuyển hướng 80→443.

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;          # ĐỔI: vd api.mcup.vn

    # Cho phép upload clip audio (khớp MAX_CLIP_MB=12 trong .env, chừa dư)
    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3011;   # ĐỔI nếu APP_PORT khác 3011

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;  # app đọc để chống farm khách theo IP
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    120s;   # chấm điểm/tải có thể lâu
        proxy_send_timeout    120s;
        proxy_connect_timeout 10s;
    }

    # (tuỳ chọn) phục vụ file media clip trực tiếp nếu sau này tách CDN — hiện backend tự lo.
}
