# McUp — reverse proxy nginx cho mcup.fun → backend Docker ở APP_PORT (mặc định 3011).
# Cài tự động bằng 1 lệnh trên VPS:  sudo ./setup-nginx.sh
# (script copy vào sites-available, enable, test, reload, chạy certbot lấy HTTPS nếu có)

server {
    listen 80;
    listen [::]:80;
    server_name mcup.fun www.mcup.fun;

    # Cho phép upload clip audio (khớp MAX_CLIP_MB=12 trong .env, chừa dư)
    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3011;   # APP_PORT — setup-nginx.sh tự sửa theo .env

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;  # app đọc để chống farm khách theo IP
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    120s;   # chấm điểm/tải có thể lâu
        proxy_send_timeout    120s;
        proxy_connect_timeout 10s;
    }
}
