# McUp — stack production đầy đủ. Trên VPS chỉ cần:
#   cp .env.example .env   (điền secret)
#   docker compose -f docker-compose.prod.yml up -d --build
services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Trỏ tới service postgres trong mạng compose (đè giá trị trong .env nếu có)
      DATABASE_URL: postgresql+asyncpg://mcup:${POSTGRES_PASSWORD:-mcup}@postgres:5432/mcup
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /data/uploads
    volumes:
      - clipdata:/data/uploads
    ports:
      - "127.0.0.1:8000:8000"   # chỉ localhost — ra ngoài đi qua Caddy (HTTPS)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # HTTPS tự động (Let's Encrypt) — đặt DOMAIN trong .env, trỏ DNS A record về IP VPS trước
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-:80}    # chưa có domain → serve HTTP cổng 80 (chỉ để thử)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
    depends_on:
      - api

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: mcup
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcup}
      POSTGRES_DB: mcup
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcup"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped

  # Object storage clip (AD-4). Bỏ đi nếu dùng S3 ngoài.
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-mcup}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-mcup12345}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  pgdata:
  miniodata:
  clipdata:
  caddydata:
