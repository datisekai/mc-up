# McUp — stack production GỌN cho VPS (api + postgres + caddy).
# Backend tự serve landing (/) , privacy (/privacy), terms (/terms), admin (/admin-web), API.
#
# Deploy:
#   cp .env.example .env   && nano .env   (ĐỔI JWT_SECRET, POSTGRES_PASSWORD, DOMAIN, DEBUG=false)
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Redis (worker chấm) & MinIO/S3 (lưu clip) hiện CHƯA dùng → đã bỏ cho nhẹ.
# Khi cần scale: thêm lại 2 service đó (xem DEPLOY.md).
services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://mcup:${POSTGRES_PASSWORD:-mcup}@postgres:5432/mcup
      UPLOAD_DIR: /data/uploads
    volumes:
      - clipdata:/data/uploads      # clip/giọng lưu trên đĩa (LocalMediaStore) — bền qua restart
    expose:
      - "8000"                       # chỉ nội bộ mạng compose — ra ngoài đi qua Caddy
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mcup
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcup}
      POSTGRES_DB: mcup
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcup"]
      interval: 5s
      timeout: 3s
      retries: 10

  # HTTPS tự động (Let's Encrypt) khi DOMAIN là tên miền thật đã trỏ DNS về IP VPS.
  # Chưa có domain → DOMAIN=:80 (phục vụ HTTP theo IP để thử) — đặt trong .env.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - api

volumes:
  pgdata:
  clipdata:
  caddydata:
  caddyconfig:
